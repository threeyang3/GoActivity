<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoActivity 管理后台</title>
    <style>
        /* ═══════════════════════════════════════════
           GoActivity — Editorial Campus Bulletin
           ═══════════════════════════════════════════ */

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

        :root {
            --bg:        #faf8f0;
            --bg-card:   #ffffff;
            --bg-dark:   #1a2e23;
            --bg-hover:  #f4f2ea;
            --text:      #2c2c2c;
            --text-sec:  #7a7a6e;
            --text-inv:  #faf8f0;
            --accent:    #1a5c3a;
            --accent-lt: #e8f5e9;
            --amber:     #c8956c;
            --amber-lt:  #fdf4ec;
            --red:       #c0392b;
            --red-lt:    #fceaea;
            --blue:      #2980b9;
            --blue-lt:   #eaf4fc;
            --border:    #e8e6dd;
            --shadow:    0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
            --radius:    10px;
            --serif:     'Playfair Display', Georgia, 'Noto Serif SC', serif;
            --sans:      'Source Sans 3', -apple-system, 'Segoe UI', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* ── Header / Masthead ── */
        .masthead {
            background: var(--bg-dark);
            color: var(--text-inv);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }
        .masthead-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .masthead-brand {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .masthead-brand h1 {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .masthead-brand .edition {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--amber);
            font-weight: 500;
        }
        .masthead-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ── Buttons ── */
        .btn {
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.01em;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: #237a4a; }
        .btn-amber {
            background: var(--amber);
            color: #fff;
        }
        .btn-amber:hover { background: #b8844f; }
        .btn-ghost {
            background: rgba(255,255,255,0.1);
            color: var(--text-inv);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.18); }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-feishu { background: #3370ff; color: #fff; }
        .btn-feishu:hover { background: #2860e0; }

        /* ── Container ── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 32px 60px;
        }

        /* ── Section divider ── */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 36px 0 20px;
        }
        .section-divider h2 {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Stat cards ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border-left: 3px solid var(--accent);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sec);
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-family: var(--serif);
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .stat-card.amber  { border-left-color: var(--amber); }
        .stat-card.green   { border-left-color: #27ae60; }
        .stat-card.red     { border-left-color: var(--red); }
        .stat-card.blue    { border-left-color: var(--blue); }

        /* ── Cards / Panels ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .card-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-head h3 {
            font-family: var(--serif);
            font-size: 16px;
            font-weight: 600;
        }
        .card-body { padding: 20px 24px; }

        /* ── Today grid ── */
        .today-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .today-col {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .today-col-head {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .today-col.today .today-col-head {
            background: var(--accent-lt);
            color: var(--accent);
        }
        .today-col.upcoming .today-col-head {
            background: var(--blue-lt);
            color: var(--blue);
        }
        .today-col-body { padding: 4px 0; }
        .today-item {
            padding: 10px 16px;
            border-bottom: 1px solid #f5f5f0;
            transition: background 0.15s;
        }
        .today-item:last-child { border-bottom: none; }
        .today-item:hover { background: var(--bg-hover); }
        .today-item .ti-time {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
        }
        .today-item .ti-title {
            font-size: 14px;
            margin-top: 3px;
            cursor: pointer;
            font-weight: 500;
        }
        .today-item .ti-title:hover { color: var(--accent); }
        .today-item .ti-meta {
            font-size: 12px;
            color: var(--text-sec);
            margin-top: 2px;
        }
        .today-empty {
            padding: 20px 16px;
            color: var(--text-sec);
            font-size: 13px;
            font-style: italic;
        }

        /* ── Pending grid ── */
        .pending-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .pending-box {
            border-radius: 8px;
            padding: 16px;
            border: 1px solid;
        }
        .pending-box.warn   { background: var(--amber-lt); border-color: #f0d6b8; }
        .pending-box.error  { background: var(--red-lt);   border-color: #f0c0bf; }
        .pending-box.info   { background: var(--blue-lt);  border-color: #b8d8f0; }
        .pending-box.ok     { background: var(--accent-lt); border-color: #b8e0c0; }
        .pending-box .pb-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .pending-box.warn  .pb-title { color: #8a6530; }
        .pending-box.error .pb-title { color: var(--red); }
        .pending-box.info  .pb-title { color: var(--blue); }
        .pending-box.ok    .pb-title { color: var(--accent); }
        .pending-box .pb-item {
            padding: 3px 0;
            font-size: 13px;
        }
        .pending-box .pb-item a {
            color: inherit;
            text-decoration: none;
        }
        .pending-box .pb-item a:hover { text-decoration: underline; }
        .pending-box .pb-empty { font-size: 12px; color: var(--text-sec); font-style: italic; }

        /* ── Accuracy row ── */
        .accuracy-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .acc-item .acc-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sec);
            margin-bottom: 6px;
        }
        .acc-item .acc-value {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 700;
        }
        .acc-item .acc-detail {
            font-size: 13px;
            color: var(--text-sec);
            margin-top: 4px;
        }

        /* ── Sync banner ── */
        .sync-banner {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }
        .sync-banner .sb-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sync-banner .sb-dot.ok { background: #27ae60; }
        .sync-banner .sb-dot.err { background: var(--red); }

        /* ── Search ── */
        .search-bar {
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            font-family: var(--sans);
            font-size: 14px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26,92,58,0.08);
        }
        .search-input::placeholder { color: #b0b0a0; }

        /* ── Filters ── */
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-select {
            font-family: var(--sans);
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--accent); }

        /* ── Table ── */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sec);
            padding: 12px 16px;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }
        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f2f0ea;
        }
        tr:hover td { background: var(--bg-hover); }
        td a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }
        td a:hover { color: var(--accent); }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .badge-synced  { background: var(--accent-lt); color: var(--accent); }
        .badge-pending { background: var(--amber-lt);  color: #8a6530; }
        .badge-failed  { background: var(--red-lt);    color: var(--red); }
        .badge-unknown { background: #f0f0ea;          color: var(--text-sec); }

        .badge-upcoming { background: var(--blue-lt);   color: var(--blue); }
        .badge-past     { background: #f0f0ea;          color: var(--text-sec); }
        .badge-ongoing  { background: var(--accent-lt); color: var(--accent); }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
        }
        .pagination button {
            font-family: var(--sans);
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }
        .pagination button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .pg-info { font-size: 13px; color: var(--text-sec); padding: 0 8px; }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 36px;
            color: var(--text-sec);
            font-size: 14px;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20,20,15,0.5);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(2px);
        }
        .modal-box {
            background: var(--bg-card);
            margin: 48px auto;
            border-radius: 14px;
            max-width: 780px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-head {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-head h2 {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { background: var(--border); color: var(--text); }
        .modal-content { padding: 24px 28px 28px; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 28px;
        }
        .detail-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f0;
        }
        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-sec);
            margin-bottom: 3px;
        }
        .detail-value { font-size: 14px; }
        .detail-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }
        .detail-section h4 {
            font-family: var(--serif);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .poster-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .poster-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .poster-grid img:hover { transform: scale(1.05); }
        .modal-actions {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
            display: flex;
            gap: 10px;
        }
        .tag-pill {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: var(--bg);
            color: var(--text-sec);
            margin-right: 6px;
            margin-bottom: 4px;
        }

        /* ── Sync progress modal ── */
        .sync-modal .modal-box { max-width: 480px; text-align: center; }
        .sync-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        .sync-phase {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .sync-msg {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: 24px;
        }
        .sync-done-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
        }
        .sync-done-icon.ok  { background: var(--accent-lt); color: var(--accent); }
        .sync-done-icon.err { background: var(--red-lt);    color: var(--red); }
        .sync-result {
            text-align: left;
            background: var(--bg);
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.8;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease;
            max-width: 360px;
        }
        .toast.success { background: var(--accent); color: #fff; }
        .toast.error   { background: var(--red); color: #fff; }
        .toast.info    { background: var(--bg-dark); color: var(--text-inv); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .pending-grid { grid-template-columns: repeat(2, 1fr); }
            .accuracy-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .masthead-inner { flex-direction: column; gap: 12px; text-align: center; }
            .masthead-actions { flex-wrap: wrap; justify-content: center; }
            .container { padding: 20px 16px 40px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .today-grid { grid-template-columns: 1fr; }
            .pending-grid { grid-template-columns: 1fr; }
            .accuracy-grid { grid-template-columns: 1fr 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
            .modal-box { margin: 16px; }
        }
    </style>
</head>
<body>
    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Masthead -->
    <header class="masthead">
        <div class="masthead-inner">
            <div class="masthead-brand">
                <h1>GoActivity</h1>
                <span class="edition">校园活动知识库 · 管理后台</span>
            </div>
            <div class="masthead-actions">
                <button class="btn btn-feishu" id="btn-feishu" onclick="openFeishu()" style="display:none">📋 飞书表格</button>
                <button class="btn btn-ghost" onclick="triggerSync()">🔄 触发同步</button>
                <button class="btn btn-ghost" onclick="sendReport('daily')">📊 日报</button>
                <button class="btn btn-ghost" onclick="sendReport('weekly')">📈 周报</button>
                <button class="btn btn-ghost" onclick="location.reload()">↻</button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- ══ 今日纵览 ══ -->
        <div class="section-divider"><h2>今日纵览</h2></div>
        <div class="card">
            <div class="card-body">
                <div id="today-events" class="loading"><span class="spinner"></span>加载中…</div>
            </div>
        </div>

        <!-- ══ 待办事项 ══ -->
        <div class="section-divider"><h2>待办事项</h2></div>
        <div class="card">
            <div class="card-body">
                <div id="pending-items" class="loading"><span class="spinner"></span>加载中…</div>
            </div>
        </div>

        <!-- ══ 数据总览 ══ -->
        <div class="section-divider"><h2>数据总览</h2></div>
        <div class="stats-row">
            <div class="stat-card blue">
                <div class="stat-label">文章总数</div>
                <div class="stat-value" id="stat-articles">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">活动总数</div>
                <div class="stat-value" id="stat-events">—</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">已同步</div>
                <div class="stat-value" id="stat-synced">—</div>
            </div>
            <div class="stat-card amber">
                <div class="stat-label">待处理</div>
                <div class="stat-value" id="stat-pending">—</div>
            </div>
            <div class="stat-card red">
                <div class="stat-label">同步失败</div>
                <div class="stat-value" id="stat-failed">—</div>
            </div>
        </div>

        <!-- ══ 数据质量 ══ -->
        <div class="section-divider"><h2>数据质量</h2></div>
        <div class="card">
            <div class="card-body">
                <div id="accuracy-stats" class="loading"><span class="spinner"></span>加载中…</div>
            </div>
        </div>

        <!-- ══ 最近同步 ══ -->
        <div class="section-divider"><h2>最近同步</h2></div>
        <div class="card">
            <div class="card-body">
                <div id="latest-sync" class="loading"><span class="spinner"></span>加载中…</div>
            </div>
        </div>

        <!-- ══ 搜索 ══ -->
        <div class="card">
            <div class="card-body">
                <div class="search-bar">
                    <input type="text" class="search-input" id="search-input"
                           placeholder="搜索活动 — 标题、地点、嘉宾、主办方…"
                           onkeyup="handleSearchKey(event)">
                    <button class="btn btn-primary" onclick="searchEvents()">🔍 搜索</button>
                </div>
            </div>
        </div>

        <!-- ══ 活动列表 ══ -->
        <div class="section-divider"><h2>活动列表</h2></div>
        <div class="card">
            <div class="card-head">
                <h3>全部活动</h3>
                <div class="filters">
                    <select class="filter-select" id="filter-time" onchange="loadEvents()">
                        <option value="">全部时间</option>
                        <option value="today">今日</option>
                        <option value="week">本周</option>
                        <option value="month">本月</option>
                        <option value="upcoming">即将到来</option>
                        <option value="past">已结束</option>
                    </select>
                    <select class="filter-select" id="filter-status" onchange="loadEvents()">
                        <option value="">全部状态</option>
                        <option value="synced">已同步</option>
                        <option value="extracted">已抽取</option>
                        <option value="pending_ai">待处理</option>
                        <option value="failed_sync">同步失败</option>
                    </select>
                    <select class="filter-select" id="filter-category" onchange="loadEvents()">
                        <option value="">全部分类</option>
                        <option value="讲座">讲座</option>
                        <option value="演出">演出</option>
                        <option value="比赛">比赛</option>
                        <option value="招募">招募</option>
                        <option value="展览">展览</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>分类</th>
                                <th>开始时间</th>
                                <th>状态</th>
                                <th>时间</th>
                                <th>置信度</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="events-table">
                            <tr><td colspan="7" class="loading"><span class="spinner"></span>加载中…</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="events-pagination"></div>
            </div>
        </div>

        <!-- ══ 同步日志 ══ -->
        <div class="section-divider"><h2>同步日志</h2></div>
        <div class="card">
            <div class="card-body">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>目标</th>
                                <th>目标 ID</th>
                                <th>结果</th>
                                <th>输出预览</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table">
                            <tr><td colspan="5" class="loading"><span class="spinner"></span>加载中…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ══ 同步运行记录 ══ -->
        <div class="section-divider"><h2>同步运行记录</h2></div>
        <div class="card">
            <div class="card-body">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>运行 ID</th>
                                <th>来源</th>
                                <th>状态</th>
                                <th>导入数量</th>
                                <th>开始时间</th>
                                <th>完成时间</th>
                            </tr>
                        </thead>
                        <tbody id="runs-table">
                            <tr><td colspan="6" class="loading"><span class="spinner"></span>加载中…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="event-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <div class="modal-head">
                <h2 id="modal-title">活动详情</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-content" id="modal-body"></div>
        </div>
    </div>

    <!-- Sync progress modal -->
    <div id="sync-modal" class="modal-overlay sync-modal" onclick="if(event.target===this)this.style.display='none'">
        <div class="modal-box">
            <div class="modal-content" id="sync-modal-body">
                <!-- filled by JS -->
            </div>
        </div>
    </div>

    <script>
        /* ═══════════════════════════════════════════
           GoActivity — Dashboard Logic
           ═══════════════════════════════════════════ */

        let currentPage = 1;
        const PAGE_SIZE = 20;

        // ── Toast notifications ──
        function toast(msg, type = 'info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3500);
        }

        // ── API ──
        async function api(url, options = {}) {
            try {
                const resp = await fetch(url, options);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.error('API Error:', e);
                throw e;
            }
        }

        // ── Load stats ──
        async function loadStats() {
            try {
                const data = await api('/dashboard/stats');
                document.getElementById('stat-articles').textContent = data.articles.total;
                document.getElementById('stat-events').textContent = data.events.total;
                document.getElementById('stat-synced').textContent = data.events.synced;
                document.getElementById('stat-pending').textContent = data.events.pending;
                document.getElementById('stat-failed').textContent = data.events.failed;

                const syncEl = document.getElementById('latest-sync');
                if (data.latest_sync) {
                    const s = data.latest_sync;
                    const ok = s.status === 'success';
                    syncEl.innerHTML = `
                        <div class="sync-banner">
                            <span class="sb-dot ${ok ? 'ok' : 'err'}"></span>
                            <span>来源 <strong>${esc(s.source)}</strong></span>
                            <span class="badge ${ok ? 'badge-synced' : 'badge-failed'}">${s.status}</span>
                            <span>导入 <strong>${s.imported_count}</strong> 篇</span>
                            <span style="color:var(--text-sec)">${s.started_at ? new Date(s.started_at).toLocaleString() : '—'}</span>
                        </div>`;
                } else {
                    syncEl.innerHTML = '<span style="color:var(--text-sec);font-style:italic">暂无同步记录</span>';
                }
            } catch (e) {
                document.getElementById('latest-sync').innerHTML = '<span style="color:var(--red)">加载失败</span>';
            }
        }

        // ── Load today events ──
        async function loadTodayEvents() {
            try {
                const data = await api('/dashboard/today');
                const el = document.getElementById('today-events');

                let html = '<div class="today-grid">';

                // Today
                html += '<div class="today-col today"><div class="today-col-head">📌 今日活动</div><div class="today-col-body">';
                if (!data.today.length) {
                    html += '<div class="today-empty">今日暂无活动</div>';
                } else {
                    data.today.forEach(e => {
                        html += `<div class="today-item">
                            <div class="ti-time">${e.start_time || '时间待定'}</div>
                            <div class="ti-title" onclick="showEventDetail('${e.event_id}')">${esc(e.title)}</div>
                            <div class="ti-meta">${esc(e.location || '')}${e.speaker ? ' · ' + esc(e.speaker) : ''}</div>
                        </div>`;
                    });
                }
                html += '</div></div>';

                // Upcoming
                html += '<div class="today-col upcoming"><div class="today-col-head">🔜 即将到来</div><div class="today-col-body">';
                if (!data.upcoming.length) {
                    html += '<div class="today-empty">暂无即将开始的活动</div>';
                } else {
                    data.upcoming.forEach(e => {
                        html += `<div class="today-item">
                            <div class="ti-time">${e.start_time || '时间待定'}</div>
                            <div class="ti-title" onclick="showEventDetail('${e.event_id}')">${esc(e.title)}</div>
                            <div class="ti-meta">${esc(e.location || '')}</div>
                        </div>`;
                    });
                }
                html += '</div></div></div>';

                el.innerHTML = html;
            } catch (e) {
                document.getElementById('today-events').innerHTML = '<span style="color:var(--red)">加载失败</span>';
            }
        }

        // ── Load pending items ──
        async function loadPendingItems() {
            try {
                const data = await api('/dashboard/pending');
                const el = document.getElementById('pending-items');

                const boxes = [
                    { key: 'low_confidence', cls: 'warn',  icon: '⚠️', label: '低置信度' },
                    { key: 'failed_sync',    cls: 'error', icon: '❌', label: '同步失败' },
                    { key: 'pending_sync',   cls: 'info',  icon: '📤', label: '待同步' },
                    { key: 'needs_retry',    cls: 'ok',    icon: '🖼️', label: '图片重试' },
                ];

                let html = '<div class="pending-grid">';
                boxes.forEach(b => {
                    const d = data[b.key];
                    html += `<div class="pending-box ${b.cls}">
                        <div class="pb-title">${b.icon} ${b.label}（${d.count}）</div>`;
                    if (!d.items.length) {
                        html += '<div class="pb-empty">无</div>';
                    } else {
                        d.items.forEach(e => {
                            const extra = b.key === 'low_confidence'
                                ? `<span style="color:var(--red);margin-left:6px">${(e.confidence*100).toFixed(0)}%</span>`
                                : '';
                            html += `<div class="pb-item"><a href="#" onclick="showEventDetail('${e.event_id}');return false">${esc(e.title)}</a>${extra}</div>`;
                        });
                    }
                    html += '</div>';
                });
                html += '</div>';
                el.innerHTML = html;
            } catch (e) {
                document.getElementById('pending-items').innerHTML = '<span style="color:var(--red)">加载失败</span>';
            }
        }

        // ── Load accuracy ──
        async function loadAccuracy() {
            try {
                const data = await api('/dashboard/accuracy');
                const el = document.getElementById('accuracy-stats');

                const confMap = {};
                data.confidence_distribution.forEach(i => { confMap[i.level] = i.count; });
                const lo = confMap['low'] || 0, med = confMap['medium'] || 0, hi = confMap['high'] || 0;
                const topCats = data.category_distribution.slice(0, 5);
                const loPct = data.total_with_confidence > 0 ? ((lo / data.total_with_confidence) * 100).toFixed(1) : '0';

                el.innerHTML = `
                    <div class="accuracy-grid">
                        <div class="acc-item">
                            <div class="acc-label">置信度分布</div>
                            <div class="acc-detail">
                                <span style="color:#27ae60">高 ${hi}</span> ·
                                <span style="color:var(--amber)">中 ${med}</span> ·
                                <span style="color:var(--red)">低 ${lo}</span>
                            </div>
                        </div>
                        <div class="acc-item">
                            <div class="acc-label">低置信度占比</div>
                            <div class="acc-value" style="color:${parseFloat(loPct)>20?'var(--red)':'var(--accent)'}">${loPct}%</div>
                        </div>
                        <div class="acc-item">
                            <div class="acc-label">主要分类</div>
                            <div class="acc-detail">${topCats.map(c => `${c.category}: ${c.count}`).join('、')}</div>
                        </div>
                        <div class="acc-item">
                            <div class="acc-label">待审核</div>
                            <div class="acc-value" style="color:var(--amber)">${data.low_confidence_count}</div>
                        </div>
                    </div>`;
            } catch (e) {
                document.getElementById('accuracy-stats').innerHTML = '<span style="color:var(--red)">加载失败</span>';
            }
        }

        // ── Search ──
        function handleSearchKey(e) { if (e.key === 'Enter') searchEvents(); }

        async function searchEvents() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) { loadEvents(); return; }
            try {
                const data = await api(`/dashboard/search?q=${encodeURIComponent(q)}`);
                const tbody = document.getElementById('events-table');
                if (!data.items.length) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-sec)">未找到匹配的活动</td></tr>';
                } else {
                    tbody.innerHTML = data.items.map(e => eventRow(e)).join('');
                }
                document.getElementById('events-pagination').innerHTML = `<span class="pg-info">搜索结果: ${data.total} 条</span>`;
            } catch (e) {
                document.getElementById('events-table').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--red)">搜索失败</td></tr>';
            }
        }

        // ── Event detail modal ──
        async function showEventDetail(eventId) {
            try {
                const d = await api(`/dashboard/events/${eventId}`);
                if (d.error) { toast(d.error, 'error'); return; }

                document.getElementById('modal-title').textContent = d.title;

                let html = '<div class="detail-grid">';

                const fields = [
                    ['活动类型', `${d.activity_kind}（${d.activity_kind_reason}）`],
                    ['一级分类', d.category_1],
                    ['二级分类', d.category_2 || '无'],
                    ['开始时间', d.start_time || '待定'],
                    ['结束时间', d.end_time || '待定'],
                    ['活动地点', d.location || '待定'],
                    ['嘉宾', d.speaker || '待定'],
                    ['主办方', d.organizer || '待定'],
                ];
                fields.forEach(([l, v]) => {
                    html += `<div class="detail-item"><div class="detail-label">${l}</div><div class="detail-value">${esc(v)}</div></div>`;
                });
                html += '</div>';

                // Status
                html += '<div class="detail-section"><h4>状态信息</h4><div class="detail-grid">';
                const statusFields = [
                    ['状态', `<span class="badge ${badgeCls(d.status)}">${statusLabel(d.status)}</span>`],
                    ['时间状态', `<span class="badge ${timeBadgeCls(d.event_time_status)}">${timeLabel(d.event_time_status)}</span>`],
                    ['保留决策', d.retention_decision],
                    ['置信度', `${(d.confidence*100).toFixed(1)}%`],
                    ['飞书记录 ID', d.feishu_record_id || '未同步'],
                    ['用户置顶', d.user_keep ? '是' : '否'],
                ];
                statusFields.forEach(([l, v]) => {
                    html += `<div class="detail-item"><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`;
                });
                html += '</div></div>';

                if (d.summary) html += `<div class="detail-section"><h4>摘要</h4><div>${esc(d.summary)}</div></div>`;

                if (d.tags && d.tags.length) {
                    html += `<div class="detail-section"><h4>标签</h4><div>${d.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}</div></div>`;
                }

                if (d.registration || d.registration_url) {
                    html += '<div class="detail-section"><h4>报名信息</h4>';
                    if (d.registration) html += `<div>${esc(d.registration)}</div>`;
                    if (d.registration_url) html += `<div><a href="${d.registration_url}" target="_blank" style="color:var(--accent)">报名链接 →</a></div>`;
                    if (d.registration_deadline) html += `<div>报名截止: ${esc(d.registration_deadline)}</div>`;
                    if (d.participant_limit) html += `<div>人数限制: ${esc(d.participant_limit)}</div>`;
                    html += '</div>';
                }

                if (d.poster_images && d.poster_images.length) {
                    html += '<div class="detail-section"><h4>海报图片</h4><div class="poster-grid">';
                    d.poster_images.forEach(img => { html += `<img src="/storage/images/${img}" onerror="this.style.display='none'" alt="海报">`; });
                    html += '</div></div>';
                }

                if (d.article) {
                    html += '<div class="detail-section"><h4>来源文章</h4>';
                    html += `<div>公众号: ${esc(d.article.mp_name)}</div>`;
                    html += `<div>发布时间: ${esc(d.article.publish_time)}</div>`;
                    if (d.article.url) html += `<div><a href="${d.article.url}" target="_blank" style="color:var(--accent)">查看原文 →</a></div>`;
                    html += '</div>';
                }

                html += `<div class="modal-actions">
                    <button class="btn btn-primary" onclick="syncEvent('${d.event_id}');closeModal()">同步到飞书</button>
                    <button class="btn btn-amber" onclick="keepEvent('${d.event_id}',true);closeModal()">置顶</button>
                    <button class="btn btn-outline" onclick="closeModal()">关闭</button>
                </div>`;

                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('event-modal').style.display = 'block';
            } catch (e) {
                toast('加载活动详情失败: ' + e.message, 'error');
            }
        }

        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }

        // ── Load events ──
        async function loadEvents(page = 1) {
            currentPage = page;
            const timeRange = document.getElementById('filter-time').value;
            const status = document.getElementById('filter-status').value;
            const category = document.getElementById('filter-category').value;

            try {
                const params = new URLSearchParams({ page, page_size: PAGE_SIZE });
                if (timeRange) params.set('time_range', timeRange);
                if (status) params.set('status', status);
                if (category) params.set('category', category);

                const data = await api(`/dashboard/events?${params}`);
                const tbody = document.getElementById('events-table');

                if (!data.items.length) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-sec)">暂无数据</td></tr>';
                } else {
                    tbody.innerHTML = data.items.map(e => eventRow(e)).join('');
                }
                renderPagination(data.page, data.pages, data.total);
            } catch (e) {
                document.getElementById('events-table').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--red)">加载失败</td></tr>';
            }
        }

        function eventRow(e) {
            return `<tr>
                <td><a href="#" onclick="showEventDetail('${e.event_id}');return false">${esc(e.title)}</a></td>
                <td>${esc(e.category_1)}</td>
                <td>${e.start_time || '—'}</td>
                <td><span class="badge ${badgeCls(e.status)}">${statusLabel(e.status)}</span></td>
                <td><span class="badge ${timeBadgeCls(e.event_time_status)}">${timeLabel(e.event_time_status)}</span></td>
                <td>${(e.confidence*100).toFixed(0)}%</td>
                <td>${e.feishu_record_id ? '<span class="badge badge-synced">已同步</span>' : `<button class="btn btn-primary btn-sm" onclick="syncEvent('${e.event_id}')">同步</button>`}</td>
            </tr>`;
        }

        // ── Pagination ──
        function renderPagination(cur, total, count) {
            const el = document.getElementById('events-pagination');
            if (total <= 1) { el.innerHTML = ''; return; }
            let h = `<button ${cur<=1?'disabled':''} onclick="loadEvents(${cur-1})">‹ 上一页</button>`;
            const s = Math.max(1, cur-2), e = Math.min(total, cur+2);
            if (s > 1) h += `<button onclick="loadEvents(1)">1</button>`;
            if (s > 2) h += '<button disabled>…</button>';
            for (let i = s; i <= e; i++) h += `<button class="${i===cur?'active':''}" onclick="loadEvents(${i})">${i}</button>`;
            if (e < total-1) h += '<button disabled>…</button>';
            if (e < total) h += `<button onclick="loadEvents(${total})">${total}</button>`;
            h += `<button ${cur>=total?'disabled':''} onclick="loadEvents(${cur+1})">下一页 ›</button>`;
            h += `<span class="pg-info">共 ${count} 条</span>`;
            el.innerHTML = h;
        }

        // ── Logs ──
        async function loadLogs() {
            try {
                const data = await api('/dashboard/sync-logs?limit=20');
                const tbody = document.getElementById('logs-table');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-sec)">暂无日志</td></tr>';
                } else {
                    tbody.innerHTML = data.map(l => `<tr>
                        <td>${l.created_at ? new Date(l.created_at).toLocaleString() : '—'}</td>
                        <td>${esc(l.target)}</td>
                        <td>${esc(l.target_id)}</td>
                        <td><span class="badge ${l.return_code===0?'badge-synced':'badge-failed'}">${l.return_code===0?'成功':'失败'}</span></td>
                        <td title="${esc(l.stdout_preview)}">${esc(l.stderr_preview||l.stdout_preview||'—').substring(0,50)}</td>
                    </tr>`).join('');
                }
            } catch (e) {
                document.getElementById('logs-table').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--red)">加载失败</td></tr>';
            }
        }

        // ── Runs ──
        async function loadRuns() {
            try {
                const data = await api('/dashboard/sync-runs?limit=20');
                const tbody = document.getElementById('runs-table');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-sec)">暂无记录</td></tr>';
                } else {
                    tbody.innerHTML = data.map(r => `<tr>
                        <td><code style="font-size:12px;color:var(--text-sec)">${esc(r.run_id)}</code></td>
                        <td>${esc(r.source)}</td>
                        <td><span class="badge ${r.status==='success'?'badge-synced':r.status==='running'?'badge-pending':'badge-failed'}">${r.status}</span></td>
                        <td>${r.imported_count}</td>
                        <td>${r.started_at ? new Date(r.started_at).toLocaleString() : '—'}</td>
                        <td>${r.completed_at ? new Date(r.completed_at).toLocaleString() : '—'}</td>
                    </tr>`).join('');
                }
            } catch (e) {
                document.getElementById('runs-table').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">加载失败</td></tr>';
            }
        }

        // ── Feishu link ──
        let feishuUrl = null;
        async function loadFeishuLink() {
            try {
                const data = await api('/dashboard/feishu-link');
                if (data.configured && data.url) {
                    feishuUrl = data.url;
                    document.getElementById('btn-feishu').style.display = '';
                }
            } catch (e) {}
        }
        function openFeishu() { if (feishuUrl) window.open(feishuUrl, '_blank'); }

        // ── Actions ──
        async function triggerSync() {
            if (!confirm('确定要触发一次自动同步吗？')) return;

            const modal = document.getElementById('sync-modal');
            const body  = document.getElementById('sync-modal-body');

            // 显示加载中状态
            body.innerHTML = `
                <div class="sync-spinner"></div>
                <div class="sync-phase">正在启动同步…</div>
                <div class="sync-msg">请稍候，正在拉取文章并同步数据</div>`;
            modal.style.display = 'block';

            try {
                // 触发同步（立即返回）
                const r = await api('/sync/auto', { method: 'POST' });

                if (r.status === 'already_running') {
                    body.innerHTML = `
                        <div class="sync-spinner"></div>
                        <div class="sync-phase">同步进行中</div>
                        <div class="sync-msg">${esc(r.message)}</div>
                        <button class="btn btn-outline" onclick="document.getElementById('sync-modal').style.display='none'" style="margin-top:12px">关闭</button>`;
                    return;
                }

                // 轮询状态
                pollSyncStatus(body, modal);
            } catch (e) {
                body.innerHTML = `
                    <div class="sync-done-icon err">✕</div>
                    <div class="sync-phase">同步失败</div>
                    <div class="sync-msg">${esc(e.message)}</div>
                    <button class="btn btn-outline" onclick="document.getElementById('sync-modal').style.display='none'" style="margin-top:12px">关闭</button>`;
            }
        }

        function pollSyncStatus(body, modal) {
            const poll = setInterval(async () => {
                try {
                    const s = await api('/sync/status');

                    if (s.phase === 'done') {
                        clearInterval(poll);
                        const r = s.result || {};
                        body.innerHTML = `
                            <div class="sync-done-icon ok">✓</div>
                            <div class="sync-phase">同步完成</div>
                            <div class="sync-result">
                                文章拉取: <strong>${r.articles_fetched ?? 0}</strong> 篇<br>
                                事件同步: <strong>${r.events_synced ?? 0}</strong> 条<br>
                                失败: <strong>${r.events_failed ?? 0}</strong> 条
                            </div>
                            <button class="btn btn-primary" onclick="document.getElementById('sync-modal').style.display='none';loadStats();loadEvents()" style="margin-top:16px">刷新数据</button>`;
                        loadStats(); loadEvents();
                    } else if (s.phase === 'error') {
                        clearInterval(poll);
                        body.innerHTML = `
                            <div class="sync-done-icon err">✕</div>
                            <div class="sync-phase">同步失败</div>
                            <div class="sync-msg">${esc(s.message)}</div>
                            <button class="btn btn-outline" onclick="document.getElementById('sync-modal').style.display='none'" style="margin-top:12px">关闭</button>`;
                    } else {
                        // 仍在进行中，更新状态文字
                        const phaseMap = { fetching: '拉取文章', extracting: '抽取活动', syncing: '同步飞书' };
                        body.innerHTML = `
                            <div class="sync-spinner"></div>
                            <div class="sync-phase">${phaseMap[s.phase] || '处理中'}…</div>
                            <div class="sync-msg">${esc(s.message)}</div>`;
                    }
                } catch (e) {
                    // 轮询出错，继续重试
                }
            }, 1500);
        }

        async function sendReport(type) {
            if (!confirm(`确定要发送${type==='daily'?'日报':'周报'}吗？`)) return;
            try {
                const r = await api(`/reports/${type}?send_to_feishu=true`, { method: 'POST' });
                toast(r.feishu_sent ? '报告已发送到飞书！' : '报告生成成功，但飞书发送失败: ' + (r.feishu_error||''), r.feishu_sent ? 'success' : 'error');
            } catch (e) { toast('发送失败: ' + e.message, 'error'); }
        }

        async function syncEvent(eventId) {
            try {
                const r = await api(`/events/${eventId}/sync-feishu`, { method: 'POST' });
                toast('同步结果: ' + r.status, 'success');
                loadEvents(currentPage); loadStats();
            } catch (e) { toast('同步失败: ' + e.message, 'error'); }
        }

        async function keepEvent(eventId, value) {
            try {
                const r = await api(`/events/${eventId}/keep?value=${value}`, { method: 'POST' });
                toast('操作结果: ' + r.retention_decision, 'success');
                loadEvents(currentPage);
            } catch (e) { toast('操作失败: ' + e.message, 'error'); }
        }

        // ── Helpers ──
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function badgeCls(s) {
            if (s === 'synced') return 'badge-synced';
            if (['extracted','pending_ai'].includes(s)) return 'badge-pending';
            if (s === 'failed_sync') return 'badge-failed';
            return 'badge-unknown';
        }
        function statusLabel(s) {
            return { synced:'已同步', extracted:'已抽取', pending_ai:'待处理', failed_sync:'同步失败', failed_extract:'抽取失败', needs_image_retry:'图片重试' }[s] || s;
        }
        function timeBadgeCls(s) {
            return { upcoming:'badge-upcoming', past:'badge-past', ongoing:'badge-ongoing' }[s] || 'badge-unknown';
        }
        function timeLabel(s) {
            return { upcoming:'即将开始', past:'已结束', ongoing:'进行中', unknown:'未知' }[s] || s;
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => {
            loadTodayEvents();
            loadPendingItems();
            loadStats();
            loadEvents();
            loadLogs();
            loadRuns();
            loadFeishuLink();
            loadAccuracy();
            setInterval(loadStats, 30000);
        });
    </script>
</body>
</html>
